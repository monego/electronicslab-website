<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUPEDEE - Calculador de Resistores</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#1976d2"/>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calculador de Resistores</h1>
        </header>
        <main>
            <div class="input-group">
                <label for="resistance-input">Digite o valor da resistência desejada (Ω):</label>
                <input type="text" id="resistance-input" placeholder="ex: 4k7 ou 100">
            </div>
            <div id="results-container" style="display: none;">
                <h2>Associações Possíveis:</h2>
                <p class="legend"><span>+</span> = Série, <span>||</span> = Paralelo</p>
                <ul id="results-list">
                </ul>
            </div>
            <div id="canvas-container" class="canvas-container" style="display: none;">
                <canvas id="resistor-canvas" width="500" height="200"></canvas>
            </div>
        </main>
    </div>

    <script src="calculador.js"></script>
    <script src="app.js"></script>
</body>
</html>
